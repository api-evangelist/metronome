      type: object
      properties:
        size:
          type: string
          nullable: true
        level:
          type: number
        starting_at:
          type: string
    PreviewEventsPayload:
      type: object
      required:
      - events
      additionalProperties: false
      properties:
        events:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/PreviewEvent'
          description: 'Array of usage events to include in the preview calculation. Must contain at least one event in `merge` mode.

            '
        mode:
          type: string
          enum:
          - replace
          - merge
          default: replace
          description: 'Controls how the provided events are combined with existing usage data. Use `replace` to calculate the preview as if these are the only events for the customer, ignoring all historical usage.  Use `merge` to combine these events with the customer''s existing usage.  Defaults to `replace`.

            '
        skip_zero_qty_line_items:
          type: boolean
          default: false
          description: When `true`, line items with zero quantity are excluded from the response.
    SpendBreakdownInvoicesQueryPayload:
      required:
      - starting_on
      - ending_before
      type: object
      additionalProperties: false
      properties:
        starting_on:
          type: string
          format: date-time
          description: RFC 3339 timestamp. Breakdowns will only be returned for time windows that start on or after this time.
        ending_before:
          type: string
          format: date-time
          description: RFC 3339 timestamp. Breakdowns will only be returned for time windows that end on or before this time.
        skip_zero_qty_line_items:
          type: boolean
          description: If set, all zero quantity line items will be filtered out of the response.
        credit_type_id:
          type: string
          format: uuid
          description: If provided, only invoices with the specified credit type id will be included in the response.
        sort:
          type: string
          description: Invoice sort order by issued_at, e.g. date_asc or date_desc.  Defaults to date_asc.
          enum:
          - date_asc
          - date_desc
          default: date_asc
        window_size:
          type: string
          description: The granularity of the breakdowns to return. Defaults to "day".
          enum:
          - day
          - none
          - DAY
          - NONE
          - Day
          - None
        group_keys:
          type: array
          description: 'A list of keys that can be used to additionally segment the values of the billable metric when making usage queries. Must be valid keys that are present in the billable metrics or an empty list. The value will be ignored and the default keys will be used if: billable metric is MAX type; product uses tiered pricing model; product has quantity rounding enabled; there are contract overrides based on presentation group keys

            '
          items:
            type: string
        group_filters:
          description: 'An object where the keys are the group keys and the values are arrays of group values. If the values is an empty array, the returned usage data will be aggregated across all values for that key. The value will be ignored and the default keys will be used if: billable metric is MAX type; product uses tiered pricing model; product has quantity rounding enabled; there are contract overrides based on presentation group keys

            '
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        limit:
          type: integer
          description: Max number of results that should be returned. For daily and "none" breakdowns, the response can return up to 35 days worth of breakdowns. If there are more results, a cursor to the next page is returned.
          minimum: 1
          maximum: 100
          default: 100
        next_page:
          type: string
          description: Cursor that indicates where the next page of results should start.
