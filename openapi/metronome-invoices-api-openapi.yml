        discount_custom_fields:
          x-cf-entity: discount
          $ref: '#/components/schemas/CustomField'
        origin:
          type: object
          description: Present on line items from invoices with type USAGE_CONSOLIDATED. Indicates the original customer, contract, invoice and line item from which this line item was copied.
          required:
