  /v1/contracts/customerBalances/getNetBalance:
    post:
      description: 'Retrieve the combined current balance across any grouping of credits and commits for a customer in a single API call.

        - Display real-time available balance to customers in billing dashboards

        - Build finance dashboards showing credit utilization across customer segments

        - Validate expected vs. actual balance during billing reconciliation


        ### Key response fields:

        - `balance`: The combined net balance available to use at this moment across all matching commits and credits

        - `credit_type_id`: The credit type (fiat or custom pricing unit) the balance is denominated in


        ### Filtering options:

        Balance filters allow you to scope the calculation to specific subsets of commits and credits. When using multiple filter objects, they are OR''d together — if a commit or credit matches any filter, it''s included in the net balance. Within a single filter object, all specified conditions are AND''d together.

        - **Balance types**: Include any combination of `PREPAID_COMMIT`, `POSTPAID_COMMIT`, and `CREDIT` (e.g., `["PREPAID_COMMIT", "CREDIT"]` to exclude postpaid commits). If not specified, all balance types are included.

        - **Specific IDs**: Target exact commit or credit IDs for precise balance queries

        - **Custom fields**: Filter by custom field key-value pairs; when multiple pairs are provided, commits must match all of them


        **Example**: To get the balance of all free-trial credits OR all signup-promotion commits, you''d pass two filter objects — one filtering for CREDIT with custom field campaign: free-trial, and another filtering for PREPAID_COMMIT with custom field campaign: signup-promotion.


        ### Usage guidelines:

        - **Balance ledger details**: Use the [listBalances](https://docs.metronome.com/api-reference/credits-and-commits/list-balances) endpoint instead to understand detailed ledger drawdowns for each individual balance

        - **Draft invoice handling**: Use `invoice_inclusion_mode` to control whether pending draft invoice deductions are included (`FINALIZED_AND_DRAFT`, the default) or excluded (`FINALIZED`) from the balance calculation

        - **Account hierarchies**: When querying a child customer, shared commits from parent contracts are not included — query the parent customer directly to see shared commit balances

        - **Negative balances**: Manual ledger entries can cause negative segment balances; these are treated as zero when calculating the net balance

        - **Credit types**: If `credit_type_id` is not specified, the balance defaults to USD (cents)

        '
      operationId: getNetBalance-v1
      summary: Get the net balance of a customer
      tags:
      - Credits and commits
      requestBody:
        description: Get the combined net balance for any grouping of credits and commits.
        content:
          application/json:
            schema:
              type: object
              required:
              - customer_id
              properties:
                customer_id:
                  type: string
                  format: uuid
                  description: The ID of the customer.
                credit_type_id:
                  type: string
                  format: uuid
                  description: The ID of the credit type (can be fiat or a custom pricing unit) to get the balance for. Defaults to USD (cents) if not specified.
                filters:
                  type: array
                  description: Balance filters are OR'd together, so if a given commit or credit matches any of the filters, it will be included in the net balance.
                  items:
                    $ref: '#/components/schemas/BalanceFilter'
                invoice_inclusion_mode:
                  type: string
                  description: Controls which invoices are considered when calculating the remaining balance. `FINALIZED` considers only deductions from finalized invoices. `FINALIZED_AND_DRAFT` also includes deductions from pending draft invoices.
                  enum:
                  - FINALIZED
                  - FINALIZED_AND_DRAFT
                  default: FINALIZED_AND_DRAFT
            example:
              customer_id: 13117714-3f05-48e5-a6e9-a66093f13b4d
              credit_type_id: 2714e483-4ff1-48e4-9e25-ac732e8f24f2
              filters:
              - balance_types:
                - CREDIT
                custom_fields:
                  campaign: free-trial
              - balance_types:
                - PREPAID_COMMIT
                - POSTPAID_COMMIT
                custom_fields:
                  campaign: signup-promotion
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - balance
                    - credit_type_id
                    properties:
                      balance:
                        type: number
                        description: The combined net balance that the customer has access to use at this moment across all pertinent commits and credits.
                      credit_type_id:
                        type: string
                        format: uuid
                        description: The ID of the credit type (can be fiat or a custom pricing unit) that the balance is for.
                example:
                  data:
                    balance: 123.45
                    credit_type_id: 2714e483-4ff1-48e4-9e25-ac732e8f24f2
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/contracts/seatBalances/list:
    post:
      description: 'Retrieve detailed balance for seat-based credits and commits from the contract''s subscriptions, broken down by individual seats.


        ### Use this endpoint to:

        - Display per-seat balance information in customer dashboards

        - Filter balance data by subscription or specific seats


        ### Key response fields:

        An array of seat balance objects containing:

        - Seat id

        - Balance: current total balance across all commits and credits


        ### Usage guidelines:

        - Date filtering: use `covering_date` OR `starting_at`/`ending_before` to filter balance data by time range

        - Set `include_credits_and_commits=true` for detailed commits and credits breakdown per seat

        - Set `include_ledgers=true` for detailed transaction history per commit/credit per seat

        '
      summary: List seat balances
      operationId: listSeatBalances-v1
      tags:
      - Credits and commits
      requestBody:
        description: List seat-level balances for commits and credits.
        content:
          application/json:
            schema:
              type: object
              required:
              - customer_id
              - contract_id
              properties:
                customer_id:
                  type: string
                  format: uuid
                  description: The customer ID to retrieve seat balances for
                contract_id:
                  type: string
                  format: uuid
                  description: The contract ID to retrieve seat balances for
                subscription_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Optional filter to only include seats from specific subscriptions. If subscriptions ids are not mapped to SEAT_BASED subscriptions, error will be returned.
                seat_ids:
                  type: array
                  items:
                    type: string
                  description: Optional filter to only include specific seats
                include_credits_and_commits:
                  type: boolean
                  default: false
                  description: Include credits and commits in the response
                include_ledgers:
                  type: boolean
                  default: false
                  description: Include ledger entries for each commit and commit. `include_credits_and_commits` must be set to `true` for `include_ledgers=true` to apply.
                starting_at:
                  type: string
                  format: date-time
                  description: Include only commits or credits with access effective on or after this date (cannot be used with covering_date).
                effective_before:
                  type: string
                  format: date-time
                  description: Include only commits or credits with access effective on or before this date (cannot be used with covering_date).
                covering_date:
                  type: string
                  format: date-time
                  description: Include only commits or credits with access that cover this specific date (cannot be used with starting_at or ending_before).
                limit:
                  type: integer
                  description: 'Maximum number of seats to return. Range: 1-100. Default: 25.

                    When `include_credits_and_commits = true`, if the total commits/credits across all seats exceeds 100, a limit of 100 applies to the total credits and commits. Seats are included greedily to maximize the number of seats returned.

                    Example: if seat 1 has 98 commits and seat 2 has 10 commits, both seats will be returned (total: 108 commits). Each returned seat includes all of its associated credits and commits.

                    '
                cursor:
                  type: string
                  description: Page token from a previous response to retrieve the next page
            example:
              customer_id: 13117714-3f05-48e5-a6e9-a66093f13b4d
              contract_id: d7abd0cd-4ae9-4db7-8676-e986a4ebd8dc
              subscription_ids:
              - 8deed800-1b7a-495d-a207-6c52bac54dc9
              include_credits_and_commits: true
              include_ledgers: true
              covering_date: '2024-03-01T00:00:00.000Z'
              limit: 25
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SeatBalance'
                  pagination:
                    type: object
                    required:
                    - seats_included
                    - seats_available_for_next_page
                    properties:
                      seats_included:
                        type: number
                        description: Number of seats included in this response
                      seats_available_for_next_page:
                        type: number
                        description: Number of seats available to fetch in the next page
                      next_page:
                        type: string
                        nullable: true
                        description: Token to retrieve the next page of results. Null if no more pages available
              example:
                data:
                - seat_id: seat_1
                  balances:
                  - credit_type_id: 2714e483-4ff1-48e4-9e25-ac732e8f24f2
                    balance: 30000
                    starting_balance: 50000
                  commits:
                  - id: 62c0cb84-bf3f-48b9-9bcf-a8ddf8c1cf35
                    balance: 30000
                    start_date: '2024-01-01T00:00:00.000Z'
                    end_date: '2024-02-01T00:00:00.000Z'
                    ledger_entries:
                    - type: PREPAID_COMMIT_SEGMENT_START
                      amount: 50000
                      timestamp: '2024-01-01T00:00:00.000Z'
                    - type: PREPAID_COMMIT_AUTOMATED_INVOICE_DEDUCTION
                      amount: -20000
                      timestamp: '2024-01-31T00:00:00.000Z'
                  credits:
                  - id: fa411f5b-fb85-4755-9d4d-530717be083c
                    balance: 20000
                    start_date: '2024-01-01T00:00:00.000Z'
                    end_date: '2024-02-01T00:00:00.000Z'
                    ledger_entries:
                    - type: CREDIT_SEGMENT_START
                      amount: 25000
                      timestamp: '2024-01-01T00:00:00.000Z'
                    - type: CREDIT_AUTOMATED_INVOICE_DEDUCTION
                      amount: -5000
                      timestamp: '2024-01-31T00:00:00.000Z'
                - seat_id: seat_2
                  balances:
                  - credit_type_id: 2714e483-4ff1-48e4-9e25-ac732e8f24f2
                    balance: 45000
                    starting_balance: 45000
                  commits:
                  - id: 62c0cb84-bf3f-48b9-9bcf-a8ddf8c1cf35
                    balance: 45000
                    start_date: '2024-01-01T00:00:00.000Z'
                    end_date: '2024-02-01T00:00:00.000Z'
                    ledger_entries:
                    - type: PREPAID_COMMIT_SEGMENT_START
                      amount: 45000
                      timestamp: '2024-01-01T00:00:00.000Z'
                  credits: []
                pagination:
                  next_page: eyJsYXN0X3NlYXRfaWQiai
