              type: string
              enum:
              - INVOICE
              - PAYMENT_INTENT
              description: If left blank, will default to INVOICE
            invoice_metadata:
              type: object
              additionalProperties:
                type: string
              description: Metadata to be added to the Stripe invoice. Only applicable if using INVOICE as your payment type.
            on_session_payment:
