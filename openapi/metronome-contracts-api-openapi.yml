  /v1/packages/listContractsOnPackage:
    post:
      description: "For a given package, returns all contract IDs and customer IDs associated with the package over a specific time period. \n\n### Use this endpoint to:\n- Understand which customers are provisioned on a package at any given time for internal cohort management\n- Manage customer migrations to a new package. For example, to migrate all active customers to a new package, call this endpoint, end contracts, and provision customers on a new package.\n\n### **Usage guidelines:**\nUse the **`starting_at`**, **`covering_date`**, and **`include_archived`** parameters to filter the list of returned contracts. For example, to list only currently active contracts, pass **`covering_date`** equal to the current time.\n"
      summary: List contracts associated with a package
      operationId: listContractsOnPackage-v1
      tags:
      - Contracts
      parameters:
      - $ref: '#/components/parameters/PageLimit'
      - $ref: '#/components/parameters/NextPage'
      requestBody:
        description: Package ID and optional filters
        content:
          application/json:
            schema:
              type: object
              required:
              - package_id
              properties:
                package_id:
                  type: string
                  format: uuid
                starting_at:
                  type: string
                  format: date-time
                  description: Optional RFC 3339 timestamp. Only include contracts that started on or after this date. This cannot be provided if covering_date filter is provided.
                covering_date:
                  type: string
                  format: date-time
                  description: Optional RFC 3339 timestamp. Only include contracts active on the provided date. This cannot be provided if starting_at filter is provided.
                include_archived:
                  type: boolean
                  description: Default false. Determines whether to include archived contracts in the results
            example:
