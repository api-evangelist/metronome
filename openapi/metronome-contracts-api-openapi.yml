      type: object
      properties:
        add_seat_ids:
          type: array
          description: Adds seat IDs to the subscription.  If there are unassigned seats, the new seat IDs will fill these unassigned seats and not increase the total subscription quantity. Otherwise, if there are more new seat IDs than unassigned seats, the total subscription quantity will increase.
          items:
            $ref: '#/components/schemas/SubscriptionSeatUpdateAssignedSeat'
        remove_seat_ids:
          type: array
          description: Removes seat IDs from the subscription, if possible.  If a seat ID is removed, the total subscription quantity will decrease. Otherwise, if the seat ID is not found on the subscription, this is a no-op.
          items:
            $ref: '#/components/schemas/SubscriptionSeatUpdateAssignedSeat'
        add_unassigned_seats:
          type: array
          description: Adds unassigned seats to the subscription. This will increase the total subscription quantity.
          items:
            $ref: '#/components/schemas/SubscriptionSeatUpdateUnassignedSeat'
        remove_unassigned_seats:
          type: array
          description: Removes unassigned seats from the subscription. This will decrease the total subscription quantity if there are are unassigned seats.
          items:
            $ref: '#/components/schemas/SubscriptionSeatUpdateUnassignedSeat'
