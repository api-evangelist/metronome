  /v2/contracts/edit:
    post:
      description: 'The ability to edit a contract helps you react quickly to the needs of your customers and your business.


        ### Use this endpoint to:

        - Encode mid-term commitment and discount changes

        - Fix configuration mistakes and easily roll back packaging changes


        ### Key response fields:

        - The `id` of the edit

        - Complete edit details. For example, if you edited the contract to add new overrides and credits, you will receive the IDs of those overrides and credits in the response.


        ### Usage guidelines:

        - When you edit a contract, any draft invoices update immediately to reflect that edit. Finalized invoices remain unchanged - you must void and regenerate them in the UI or API to reflect the edit.

        - Contract editing must be enabled to use this endpoint. Reach out to your Metronome representative to learn more.

        '
      summary: Edit a contract
      operationId: editContract-v2
      tags:
      - Contracts
      requestBody:
        description: Contract and customer IDs and fields to update
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditContractPayload'
            example:
              customer_id: 13117714-3f05-48e5-a6e9-a66093f13b4d
              contract_id: d7abd0cd-4ae9-4db7-8676-e986a4ebd8dc
              add_overrides:
              - type: MULTIPLIER
                starting_at: '2024-11-02T00:00:00Z'
                product_id: d4fc086c-d8e5-4091-a235-fbba5da4ec14
                multiplier: 2
                priority: 100
              add_scheduled_charges:
              - product_id: 2e30f074-d04c-412e-a134-851ebfa5ceb2
                schedule:
                  schedule_items:
                  - timestamp: '2020-02-15T00:00:00.000Z'
                    unit_price: 1000000
                    quantity: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    $ref: '#/components/schemas/Id'
              example:
                data:
                  id: d7abd0cd-4ae9-4db7-8676-e986a4ebd8dc
        '400':
          description: Error
          content:
            application/json:
              schema:
                type: object
                required:
                - code
                - message
                properties:
                  code:
                    type: string
                    enum:
                    - CustomerNotFound
                    - ContractNotFound
                  message:
                    type: string
components:
  schemas:
    BillingProviderDeliveryMethodType:
      type: string
      enum:
      - direct_to_billing_provider
      - aws_sqs
      - tackle
      - aws_sns
    HierarchyLink:
      type: object
      required:
      - contract_id
      - customer_id
      properties:
        contract_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
    SpendThresholdConfiguration:
      type: object
      required:
      - is_enabled
      - threshold_amount
      - commit
      - payment_gate_config
      properties:
        is_enabled:
          type: boolean
          description: When set to false, the contract will not be evaluated against the threshold_amount. Toggling to true will result an immediate evaluation, regardless of prior state.
        threshold_amount:
          description: Specify the threshold amount for the contract. Each time the contract's usage hits this amount, a threshold charge will be initiated.
          type: number
        commit:
          $ref: '#/components/schemas/SpendThresholdCommit'
        payment_gate_config:
          $ref: '#/components/schemas/PaymentGateConfig'
        discount_configuration:
          x-mint:
            groups:
            - ff:threshold-billing-discounts
          $ref: '#/components/schemas/DiscountConfiguration'
    SubscriptionProrationInput:
      type: object
      properties:
        is_prorated:
          type: boolean
          description: Indicates if the partial period will be prorated or charged a full amount.
        invoice_behavior:
          type: string
          enum:
          - BILL_IMMEDIATELY
          - BILL_ON_NEXT_COLLECTION_DATE
          - bill_immediately
          - bill_on_next_collection_date
          description: "Indicates how mid-period quantity adjustments are invoiced. \n**BILL_IMMEDIATELY**: Only available when collection schedule is `ADVANCE`. The quantity increase will be billed immediately on the scheduled date.\n**BILL_ON_NEXT_COLLECTION_DATE**: The quantity increase will be billed for in-arrears at the end of the period.\n"
    HierarchyConfigurationV2:
      oneOf:
      - $ref: '#/components/schemas/ParentHierarchyConfiguration'
      - $ref: '#/components/schemas/ChildHierarchyConfigurationV2'
      description: 'Either a **parent** configuration with a list of children or a **child** configuration with a single parent.

        '
    Override:
      type: object
      required:
      - id
      - created_at
      - starting_at
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        product:
          type: object
          required:
          - id
          - name
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        applicable_product_tags:
          type: array
          items:
            type: string
        override_specifiers:
          type: array
          items:
            $ref: '#/components/schemas/OverrideSpecifier'
        starting_at:
          type: string
          format: date-time
        ending_before:
          type: string
          format: date-time
        entitled:
          type: boolean
        type:
          type: string
          enum:
          - OVERWRITE
          - MULTIPLIER
          - TIERED
        priority:
          type: number
        multiplier:
          type: number
        overwrite_rate:
          $ref: '#/components/schemas/OverwriteRate'
        override_tiers:
          type: array
          items:
            $ref: '#/components/schemas/OverrideTier'
        is_commit_specific:
          type: boolean
        target:
          type: string
          enum:
          - COMMIT_RATE
          - LIST_RATE
        rate_type:
          type: string
          enum:
          - FLAT
          - flat
          - PERCENTAGE
          - percentage
          - SUBSCRIPTION
          - subscription
          - TIERED
          - tiered
          - TIERED_PERCENTAGE
          - tiered_percentage
          - CUSTOM
          - custom
          x-mint-enum:
            CUSTOM:
