      type: bearer
      token: '{{env.METRONOME_API_KEY}}'
  exposes:
  - type: rest
    namespace: metronome-threshold-billing-rest
    port: 8080
    description: REST adapter for Metronome — Threshold billing. One Spectral-compliant resource per consumed operation, prefixed
