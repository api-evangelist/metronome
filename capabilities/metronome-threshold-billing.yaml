      description: Update a customer's active recharge or prepaid balance threshold config
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metronome-threshold-billing.updateactiverechargeconfigv1
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
